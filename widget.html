<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, sans-serif;
    background: #1e1e2e;
    color: #cdd6f4;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
    gap: 12px;
  }
  h2 { font-size: 16px; opacity: .7; }
  input {
    width: 100%;
    max-width: 400px;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid #45475a;
    background: #313244;
    color: #cdd6f4;
    font-size: 15px;
    outline: none;
  }
  input:focus { border-color: #89b4fa; }
  input#pageId { font-size: 13px; opacity: .8; }
  button {
    padding: 10px 28px;
    background: #89b4fa;
    color: #1e1e2e;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  button:disabled { opacity: .5; cursor: not-allowed; }
  #status { font-size: 13px; min-height: 20px; }
</style>
</head>
<body>
  <h2>📚 썸네일 자동 설정</h2>
  <input id="title"  type="text" placeholder="작품 제목 입력" />
  <input id="pageId" type="text" placeholder="노션 페이지 ID (32자)" />
  <button id="btn" onclick="trigger()">커버 설정</button>
  <div id="status"></div>

<script>
  // GitHub 정보 — 본인 저장소로 변경
  const GITHUB_OWNER = "YOUR_GITHUB_USERNAME";
  const GITHUB_REPO  = "YOUR_REPO_NAME";
  const GITHUB_TOKEN = "YOUR_GITHUB_PAT";  // repo + workflow 권한 PAT

  async function trigger() {
    const title  = document.getElementById("title").value.trim();
    const pageId = document.getElementById("pageId").value.trim().replace(/-/g, "");
    const status = document.getElementById("status");
    const btn    = document.getElementById("btn");

    if (!title || !pageId) {
      status.textContent = "⚠️ 제목과 페이지 ID를 모두 입력해주세요.";
      return;
    }

    btn.disabled = true;
    status.textContent = "⏳ GitHub Actions 실행 중...";

    try {
      const res = await fetch(
        `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/actions/workflows/thumbnail.yml/dispatches`,
        {
          method: "POST",
          headers: {
            "Authorization": `Bearer ${GITHUB_TOKEN}`,
            "Accept": "application/vnd.github+json",
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            ref: "main",
            inputs: { title, page_id: pageId }
          })
        }
      );

      if (res.status === 204) {
        status.textContent = "✅ 실행됨! 30~60초 후 노션을 새로고침하세요.";
      } else {
        const err = await res.text();
        status.textContent = `❌ 오류 ${res.status}: ${err}`;
      }
    } catch (e) {
      status.textContent = "❌ 네트워크 오류: " + e.message;
    } finally {
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
```
