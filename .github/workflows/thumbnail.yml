name: Thumbnail Crawler

on:
  workflow_dispatch:
    inputs:
      title:
        description: '작품 제목'
        required: true
      page_id:
        description: '노션 페이지 ID'
        required: true

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4 cloudscraper
      - run: python crawl.py "${{ github.event.inputs.title }}" "${{ github.event.inputs.page_id }}"
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          WORKER_URL: ${{ secrets.WORKER_URL }}
