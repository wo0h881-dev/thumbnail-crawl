<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }

  .card {
    width: 100%;
    max-width: 360px;
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  h2 {
    font-size: 14px;
    font-weight: 600;
    color: #111;
    margin-bottom: 14px;
  }

  button {
    width: 100%;
    padding: 10px;
    background: #111;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s;
  }

  button:hover:not(:disabled) { background: #374151; }
  button:disabled { background: #9ca3af; cursor: not-allowed; }

  #status {
    margin-top: 10px;
    font-size: 12px;
    text-align: center;
    min-height: 18px;
    color: #6b7280;
  }

  #status.success { color: #059669; }
  #status.error { color: #dc2626; }
</style>
</head>
<body>
<div class="card">
  <h2>📚 웹소설 커버 설정</h2>
  <button id="btn" onclick="runCrawl()">🖼️ 커버 없는 웹소설 업데이트</button>
  <div id="status"></div>
</div>

<script>
  const WORKER_URL = "https://thumbnail-worker.wo0h881.workers.dev";
  const btn = document.getElementById("btn");
  const statusEl = document.getElementById("status");

  function setStatus(message, type = "") {
    statusEl.textContent = message;
    statusEl.className = type;
  }

  async function runCrawl() {
    btn.disabled = true;
    setStatus("⏳ 요청 중...");

    try {
      const res = await fetch(`${WORKER_URL}/trigger-crawl`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({}),
      });

      const data = await res.json();

      if (data.ok) {
        setStatus("✅ 요청 완료! 약 30초 후 노션 커버가 업데이트됩니다.", "success");
      } else {
        setStatus(`❌ ${data.message || "오류 발생"}`, "error");
      }
    } catch (e) {
      setStatus("❌ 연결 오류", "error");
    } finally {
      btn.disabled = false;
    }
  }

  setStatus("버튼을 눌러 커버 없는 웹소설을 업데이트하세요.");
</script>
</body>
</html>
