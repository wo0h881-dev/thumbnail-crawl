<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }

  .card {
    width: 100%;
    max-width: 360px;
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  h2 {
    font-size: 14px;
    font-weight: 600;
    color: #111;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .search-wrap {
    position: relative;
    margin-bottom: 10px;
  }

  input {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font-size: 13px;
    font-family: inherit;
    color: #111;
    outline: none;
    transition: border-color 0.15s;
  }

  input:focus { border-color: #6366f1; }

  .dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    right: 0;
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    z-index: 100;
    max-height: 200px;
    overflow-y: auto;
  }

  .dropdown.show { display: block; }

  .dropdown-item {
    padding: 9px 12px;
    font-size: 13px;
    color: #374151;
    cursor: pointer;
    transition: background 0.1s;
    border-bottom: 1px solid #f9fafb;
  }

  .dropdown-item:hover { background: #f3f4f6; }
  .dropdown-item:last-child { border-bottom: none; }
  .dropdown-item.empty { color: #9ca3af; cursor: default; }

  button {
    width: 100%;
    padding: 10px;
    background: #111;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s;
    margin-top: 4px;
  }

  button:hover:not(:disabled) { background: #374151; }
  button:disabled { background: #9ca3af; cursor: not-allowed; }

  #status {
    margin-top: 10px;
    font-size: 12px;
    text-align: center;
    min-height: 18px;
    color: #6b7280;
  }

  #status.success { color: #059669; }
  #status.error { color: #dc2626; }

  #preview {
    margin-top: 12px;
    display: none;
    text-align: center;
  }

  #preview img {
    max-width: 100%;
    max-height: 160px;
    border-radius: 6px;
    object-fit: cover;
    border: 1px solid #e5e7eb;
  }
</style>
</head>
<body>
<div class="card">
  <h2>📚 커버 썸네일 설정</h2>

  <div class="search-wrap">
    <input
      id="searchInput"
      type="text"
      placeholder="작품 제목 검색... (예: 도시낭인)"
      autocomplete="off"
    />
    <div class="dropdown" id="dropdown"></div>
  </div>

  <button id="btn" onclick="setCover()" disabled>🖼️ 커버 설정</button>

  <div id="status"></div>
  <div id="preview">
    <img id="previewImg" src="" alt="썸네일 미리보기" />
  </div>
</div>

<script>
  const WORKER_URL = "https://thumbnail-worker.wo0h881.workers.dev";
  let searchTimer = null;
  let selectedPageId = null;
  let selectedTitle = null;
  let selectedPlatform = null;

  const input = document.getElementById("searchInput");
  const dropdown = document.getElementById("dropdown");
  const btn = document.getElementById("btn");
  const statusEl = document.getElementById("status");
  const preview = document.getElementById("preview");
  const previewImg = document.getElementById("previewImg");

  console.log("🚀 WIDGET LOADED - Worker:", WORKER_URL);

  // ✅ 상태 표시 함수 (핵심!)
  function setStatus(message, type = "") {
    statusEl.textContent = message;
    statusEl.className = type;
    console.log("📊 Status:", message, type);
  }

  input.addEventListener("input", () => {
    const q = input.value.trim();
    selectedPageId = null;
    selectedTitle = null;
    selectedPlatform = null;
    btn.disabled = true;
    preview.style.display = "none";
    setStatus("");

    clearTimeout(searchTimer);
    if (q.length < 1) {
      hideDropdown();
      return;
    }

    searchTimer = setTimeout(() => fetchSuggestions(q), 300);
  });

  document.addEventListener("click", (e) => {
    if (!e.target.closest(".search-wrap")) hideDropdown();
  });

  async function fetchSuggestions(q) {
    try {
      setStatus("🔍 검색 중...", "");
      const url = `${WORKER_URL}/search?q=${encodeURIComponent(q)}`;
      console.log("🔍 FETCH SUGGESTIONS =", url);

      const res = await fetch(url);
      const data = await res.json();

      console.log("📋 SEARCH RESPONSE =", data);

      if (!res.ok || data.ok === false) {
        console.error("❌ search error:", data);
        showDropdown([{ id: null, title: "검색 오류" }], true);
        return;
      }

      const list = data.results || [];

      if (!list.length) {
        showDropdown([{ id: null, title: "검색 결과 없음" }], true);
        return;
      }

      showDropdown(list, false);
      setStatus(`${list.length}개 결과`, "success");
    } catch (e) {
      console.error("❌ SEARCH FETCH ERROR =", e);
      setStatus("검색 연결 오류", "error");
      showDropdown([{ id: null, title: "검색 오류" }], true);
    }
  }

  function showDropdown(list, empty) {
    dropdown.innerHTML = "";
    list.forEach(item => {
      const div = document.createElement("div");
      div.className = "dropdown-item" + (empty ? " empty" : "");
      div.textContent = item.title + (item.platform ? ` (${item.platform})` : "");
      if (!empty) {
        div.onclick = () => selectItem(item);
      }
      dropdown.appendChild(div);
    });
    dropdown.classList.add("show");
  }

  function hideDropdown() {
    dropdown.classList.remove("show");
    dropdown.innerHTML = "";
  }

  function selectItem(item) {
    input.value = item.title;
    selectedPageId = item.id;
    selectedTitle = item.title;
    selectedPlatform = item.platform;
    btn.disabled = false;
    hideDropdown();
    setStatus(`✅ "${item.title}" 선택됨! 커버 설정 클릭하세요`, "success");
    console.log("✅ SELECTED:", { selectedPageId: item.id.slice(0,8), selectedTitle, selectedPlatform });
  }

  async function setCover() {
    if (!selectedPageId || !selectedTitle) {
      setStatus("❌ 먼저 검색해서 항목을 선택하세요", "error");
      return;
    }

    btn.disabled = true;
    setStatus("⏳ 네이버/카카오에서 이미지 검색 중...", "");

    try {
      console.log("🖼️ SET COVER START:", { 
        pageId: selectedPageId.slice(0,8), 
        title: selectedTitle, 
        platform: selectedPlatform 
      });

      const res = await fetch(`${WORKER_URL}/set-cover`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          pageId: selectedPageId,
          title: selectedTitle,
          platform: selectedPlatform
        }),
      });

      const data = await res.json();
      console.log("📤 SET COVER RESPONSE:", data);

      if (data.ok) {
        setStatus("✅ 노션 커버 설정 완료!", "success");
        previewImg.src = data.imgUrl;
        preview.style.display = "block";
      } else {
        setStatus(`❌ ${data.message || "이미지 찾기 실패"}`, "error");
        if (data.debug) {
          console.log("🔍 DEBUG INFO:", data.debug);
        }
      }
    } catch (e) {
      console.error("💥 SET COVER ERROR:", e);
      setStatus("❌ 연결 오류가 발생했습니다.", "error");
    } finally {
      btn.disabled = false;
    }
  }

  // 초기 상태
  setStatus("검색어를 입력하세요", "");
</script>
</body>
</html>
